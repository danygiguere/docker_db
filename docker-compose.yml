version: '3.7'
services:

  #MySQL Service
  docker_db:
    image: mysql:5.7.22
    container_name: docker_db
    restart: unless-stopped
    tty: true
    ports:
      - ${DOCKER_MYSQL_PORTS}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      SERVICE_TAGS: dev
      SERVICE_NAME: mysql
    volumes:
      - dbdata:/var/lib/mysql/
      - ./mysql/my.cnf:/etc/mysql/my.cnf
    networks:
      - docker_db-network

#Docker Networks
networks:
  docker_db-network:
    driver: bridge

#Volumes
volumes:
  dbdata:
    driver: local
